<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario - La Terraza</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background-image:url("74BDD922-D273-4880-A6F5-25F28525BDC5.jpeg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    min-height:100vh;
}

.overlay{
    background:rgba(0,0,0,0.75);
    min-height:100vh;
    padding-bottom:30px;
}

header{
    text-align:center;
    padding:30px;
}

header h1{
    color:#f4b400;
    font-size:55px;
    text-shadow:2px 2px 10px black;
}

header p{
    color:white;
    margin-top:10px;
    font-size:18px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.5);
}

.formulario{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

input, button{
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    background:#f4b400;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#d89d00;
    transform:scale(1.03);
}

.botones{
    display:flex;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2c3e50;
    color:white;
    padding:15px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f4f4f4;
}

.rojo{
    background:#e74c3c;
    color:white;
    padding:5px 10px;
    border-radius:8px;
    font-weight:bold;
}

.amarillo{
    background:#f1c40f;
    color:black;
    padding:5px 10px;
    border-radius:8px;
    font-weight:bold;
}

.verde{
    background:#2ecc71;
    color:white;
    padding:5px 10px;
    border-radius:8px;
    font-weight:bold;
}

#historial{
    display:none;
}

footer{
    text-align:center;
    color:white;
    margin-top:20px;
    padding:20px;
}

</style>
</head>

<body>

<div class="overlay">

<header>

<h1>LA TERRAZA</h1>

<p>Coffee, Wings & More - Sistema Inteligente de Inventario</p>

</header>

<div class="container">

<div class="formulario">

<input type="text" id="producto" placeholder="Nombre del producto">

<input type="number" id="cantidad" placeholder="Cantidad">

<button onclick="agregarEntrada()">
Agregar Entrada
</button>

<button onclick="registrarSalida()">
Registrar Salida
</button>

</div>

<div class="botones">

<button onclick="mostrarInventario()">
Pantalla Inventario
</button>

<button onclick="mostrarHistorial()">
Pantalla Historial
</button>

</div>

<!-- INVENTARIO -->

<div id="inventario">

<table>

<thead>
<tr>
<th>Producto</th>
<th>Cantidad Actual</th>
<th>Estado</th>
</tr>
</thead>

<tbody id="tablaInventario">

</tbody>

</table>

</div>

<!-- HISTORIAL -->

<div id="historial">

<table>

<thead>
<tr>
<th>Producto</th>
<th>Movimiento</th>
<th>Cantidad</th>
<th>Fecha</th>
<th>Hora</th>
</tr>
</thead>

<tbody id="tablaHistorial">

</tbody>

</table>

</div>

</div>

<footer>
© 2026 Restaurante La Terraza | Control de Inventarios
</footer>

</div>

<script>

let inventario = {};

function actualizarTabla(){

    let tabla = document.getElementById("tablaInventario");
    tabla.innerHTML = "";

    for(let producto in inventario){

        let cantidad = inventario[producto];

        let estado = "";
        let clase = "";

        if(cantidad <= 5){
            estado = "Bajo";
            clase = "rojo";
        }
        else if(cantidad <= 15){
            estado = "Medio";
            clase = "amarillo";
        }
        else{
            estado = "Alto";
            clase = "verde";
        }

        tabla.innerHTML += `
        <tr>
            <td>${producto}</td>
            <td>${cantidad}</td>
            <td>
                <span class="${clase}">
                    ${estado}
                </span>
            </td>
        </tr>
        `;
    }
}

function agregarEntrada(){

    let producto = document.getElementById("producto").value;
    let cantidad = parseInt(document.getElementById("cantidad").value);

    if(producto === "" || isNaN(cantidad)){
        alert("Completa todos los campos");
        return;
    }

    if(inventario[producto]){
        inventario[producto] += cantidad;
    } else{
        inventario[producto] = cantidad;
    }

    registrarHistorial(producto, "Entrada", cantidad);

    actualizarTabla();

    limpiarCampos();
}

function registrarSalida(){

    let producto = document.getElementById("producto").value;
    let cantidad = parseInt(document.getElementById("cantidad").value);

    if(producto === "" || isNaN(cantidad)){
        alert("Completa todos los campos");
        return;
    }

    if(!inventario[producto]){
        alert("El producto no existe");
        return;
    }

    if(inventario[producto] < cantidad){
        alert("No hay suficiente inventario");
        return;
    }

    inventario[producto] -= cantidad;

    registrarHistorial(producto, "Salida", cantidad);

    actualizarTabla();

    limpiarCampos();
}

function registrarHistorial(producto, movimiento, cantidad){

    let fechaActual = new Date();

    let fecha = fechaActual.toLocaleDateString();
    let hora = fechaActual.toLocaleTimeString();

    document.getElementById("tablaHistorial").innerHTML += `
    <tr>
        <td>${producto}</td>
        <td>${movimiento}</td>
        <td>${cantidad}</td>
        <td>${fecha}</td>
        <td>${hora}</td>
    </tr>
    `;
}

function limpiarCampos(){
    document.getElementById("producto").value = "";
    document.getElementById("cantidad").value = "";
}

function mostrarInventario(){
    document.getElementById("inventario").style.display = "block";
    document.getElementById("historial").style.display = "none";
}

function mostrarHistorial(){
    document.getElementById("inventario").style.display = "none";
    document.getElementById("historial").style.display = "block";
}

</script>

</body>
</html>
